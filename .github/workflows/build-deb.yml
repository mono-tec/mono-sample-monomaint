name: Build Debian Package

on:
  # 開発中の手動確認用
  workflow_dispatch:

  # v0.1.0 などのタグをPushしたときにReleaseを作成
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: |
          dotnet restore \
            ./src/Hosts/MonoMaint.Host.Sample/MonoMaint.Host.Sample.csproj \
            --runtime linux-x64

      - name: Publish Linux application
        run: |
          dotnet publish \
            ./src/Hosts/MonoMaint.Host.Sample/MonoMaint.Host.Sample.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --no-restore \
            --output ./publish/linux

      - name: Build Debian package
        run: |
          chmod +x ./installer/ubuntu/build-deb.sh
          ./installer/ubuntu/build-deb.sh

      # タグとcsprojのVersionが一致することを確認
      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PROJECT_VERSION="$(
            dotnet msbuild \
              ./src/Hosts/MonoMaint.Host.Sample/MonoMaint.Host.Sample.csproj \
              -nologo \
              -getProperty:Version |
            tr -d '\r\n[:space:]'
          )"

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Project Version : ${PROJECT_VERSION}"
          echo "Tag Version     : ${TAG_VERSION}"

          if [ "${PROJECT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "ERROR: Project version and Git tag version do not match."
            exit 1
          fi

      # 手動実行時もActions Artifactとして残す
      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: monomaint-sample-deb
          path: installer/ubuntu/output/*.deb
          if-no-files-found: error
          retention-days: 14

      # タグPush時だけGitHub Releaseを自動作成
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            installer/ubuntu/output/*.deb \
            --title "MonoMaint ${GITHUB_REF_NAME}" \
            --generate-notes