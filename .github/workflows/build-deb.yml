name: Build Debian Package

on:
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: |
          dotnet restore \
            ./src/Hosts/MonoMaint.Host.Sample/MonoMaint.Host.Sample.csproj \
            --runtime linux-x64

      - name: Publish Linux application
        run: |
          dotnet publish \
            ./src/Hosts/MonoMaint.Host.Sample/MonoMaint.Host.Sample.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --no-restore \
            --output ./publish/linux

      - name: Build Debian package
        run: |
          chmod +x ./installer/ubuntu/build-deb.sh
          ./installer/ubuntu/build-deb.sh

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: monomaint-sample-deb
          path: installer/ubuntu/output/*.deb
          if-no-files-found: error
          retention-days: 14